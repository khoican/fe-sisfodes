name: Staging - Frontend Sisfodes

on:
  push:
    branches:
      - staging

concurrency:
  group: staging-fe-sisfodes
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Application
        run: npm run build

      - name: Deploy to VPS via rsync
        uses: burnett01/rsync-deployments@8.0.2
        with:
          switches: -az --delete
          path: ./
          remote_path: ${{ secrets.TARGET_DIR }}
          remote_host: ${{ secrets.SERVER_HOST }}
          remote_user: ${{ secrets.SERVER_USER }}
          remote_key: ${{ secrets.SSH_PRIVATE_KEY }}
          exclude: |
            .git/
            .github/
            node_modules/
            src/

      - name: Restart PM2 Service
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd ${{ secrets.TARGET_DIR }}
            # Install production dependencies di server (jika perlu)
            npm install --omit=dev
            # Restart aplikasi menggunakan PM2
            # Ganti 'sisfodes-app' dengan nama aplikasi kamu di PM2
            pm2 restart sisfodes-app || pm2 start .output/server/index.mjs --name sisfodes-app