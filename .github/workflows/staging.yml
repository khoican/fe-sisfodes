name: Staging - Frontend Sisfodes

on:
  push:
    branches:
      - staging

concurrency:
  group: staging-fe-sisfodes
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy to Staging
    runs-on: self-hosted
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
    
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
            version: 10
    
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: pnpm install

      - name: Build Application
        run: pnpm build
        env:
          NODE_ENV: staging
          Base: /

      - name: Deploy & Restart PM2
        run: |
          # cek apakah Secrets TARGET_DIR sudah diatur
          if [ -z "${{ secrets.TARGET_DIR }}" ]; then
            echo "Error: TARGET_DIR secret is not set."
            exit 1
          fi

          # Pastikan direktori target ada
          mkdir -p ${{ secrets.TARGET_DIR }}
          
          # Sinkronisasi output build
          rsync -az --delete .output/ ${{ secrets.TARGET_DIR }}/.output/
          
          # Salin file konfigurasi yang diperlukan
          cp package.json ${{ secrets.TARGET_DIR }}/
          
          # Restart aplikasi via PM2
          cd ${{ secrets.TARGET_DIR }}
          pm2 restart sisfodes-app || pm2 start .output/server/index.mjs --name sisfodes-app

          # Simpan konfigurasi pm2 agar tetap jalan setelah reboot server
          pm2 save

          # Restart server jika diperlukan (opsional, tergantung setup server)
          # sudo systemctl restart nginx
