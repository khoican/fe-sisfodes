name: Staging - Frontend Sisfodes

on:
  push:
    branches:
      - staging

concurrency:
  group: staging-fe-sisfodes
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy to Staging
    runs-on: self-hosted
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install dependencies
        run: sudo pnpm install

      - name: Build Application
        run: sudo pnpm build BASE=/
        env:
          NODE_ENV: staging

      - name: Deploy & Restart PM2
        run: |
          # Pastikan direktori target ada
          sudo mkdir -p ${{ secrets.TARGET_DIR }}
          
          # Sinkronisasi output build
          sudo rsync -az --delete .output/ ${{ secrets.TARGET_DIR }}/.output/
          
          # Salin file konfigurasi yang diperlukan
          sudo cp package.json ${{ secrets.TARGET_DIR }}/
          
          # Restart aplikasi via PM2
          cd ${{ secrets.TARGET_DIR }}
          sudo pm2 restart sisfodes-app || sudo pm2 start .output/server/index.mjs --name sisfodes-app
